<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deception Engine - Honeypot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #1a1f2e, #0d1117);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid #2a2f3e;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: #00ff88; font-size: 28px; }
        .header .subtitle { color: #888; font-size: 14px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1f2e;
            border: 1px solid #2a2f3e;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .value { font-size: 36px; font-weight: bold; color: #00ff88; }
        .stat-card .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .chart-container {
            background: #1a1f2e;
            border: 1px solid #2a2f3e;
            border-radius: 10px;
            padding: 20px;
        }
        .chart-container h3 { margin-bottom: 15px; color: #00ff88; }
        
        .attacks-table {
            background: #1a1f2e;
            border: 1px solid #2a2f3e;
            border-radius: 10px;
            overflow: hidden;
        }
        .attacks-table h3 { padding: 15px 20px; color: #00ff88; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0d1117; color: #888; padding: 10px 15px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 8px 15px; border-top: 1px solid #2a2f3e; font-size: 13px; }
        tr:hover { background: #2a2f3e; }
        .service-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .service-ssh { background: #ff4444; color: #fff; }
        .service-http { background: #4488ff; color: #fff; }
        .service-ftp { background: #ff8800; color: #fff; }
        .service-mysql { background: #ff44ff; color: #fff; }
        .service-smb { background: #44ff44; color: #000; }
        .service-rdp { background: #ffff44; color: #000; }
        
        .attack-type { color: #ff8844; }
        .ip-address { color: #44aaff; }
        .timestamp { color: #888; font-size: 11px; }
        
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .new-attack { animation: flash 0.5s; background: rgba(0, 255, 136, 0.1) !important; }
        
        @media (max-width: 768px) {
            .charts-row { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🛡 Deception Engine</h1>
            <div class="subtitle">Distributed Honeypot Network — Live Attack Monitoring</div>
        </div>
        <div id="live-indicator" style="color: #00ff88;">
            ● LIVE — <span id="attack-counter">0</span> attacks logged
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="value" id="total-attacks">0</div>
            <div class="label">Total Attacks</div>
        </div>
        <div class="stat-card">
            <div class="value" id="attacks-24h">0</div>
            <div class="label">Last 24 Hours</div>
        </div>
        <div class="stat-card">
            <div class="value" id="unique-ips">0</div>
            <div class="label">Unique Attackers</div>
        </div>
        <div class="stat-card">
            <div class="value" id="active-services">0</div>
            <div class="label">Services Hit</div>
        </div>
    </div>

    <div class="charts-row">
        <div class="chart-container">
            <h3>Attacks by Service</h3>
            <canvas id="serviceChart"></canvas>
        </div>
        <div class="chart-container">
            <h3>Attack Types</h3>
            <canvas id="typeChart"></canvas>
        </div>
    </div>

    <div class="attacks-table">
        <h3>📋 Recent Attacks <span id="attack-count" style="color:#888;font-size:14px;"></span></h3>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Service</th>
                    <th>Source IP</th>
                    <th>Type</th>
                    <th>Node</th>
                </tr>
            </thead>
            <tbody id="attacks-tbody">
                <tr><td colspan="5" style="text-align:center;color:#888;">Waiting for attacks...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let serviceChart = null;
        let typeChart = null;

        function updateStats() {
            fetch('/api/stats')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('total-attacks').textContent = data.total;
                    document.getElementById('attacks-24h').textContent = data.last_24h;
                    document.getElementById('unique-ips').textContent = data.unique_ips;
                    document.getElementById('active-services').textContent = Object.keys(data.by_service).length;
                    document.getElementById('attack-counter').textContent = data.total;
                    document.getElementById('attack-count').textContent = `(${data.recent.length} shown)`;
                    
                    updateCharts(data);
                    updateTable(data.recent);
                });
        }

        function updateCharts(data) {
            const svcCtx = document.getElementById('serviceChart').getContext('2d');
            const svcLabels = Object.keys(data.by_service);
            const svcValues = Object.values(data.by_service);
            const colors = ['#ff4444', '#4488ff', '#ff8800', '#ff44ff', '#44ff44'];
            
            if (serviceChart) serviceChart.destroy();
            serviceChart = new Chart(svcCtx, {
                type: 'doughnut',
                data: {
                    labels: svcLabels,
                    datasets: [{ data: svcValues, backgroundColor: colors.slice(0, svcLabels.length), borderWidth: 0 }]
                },
                options: { responsive: true, plugins: { legend: { labels: { color: '#e0e0e0' } } } }
            });

            const typeCtx = document.getElementById('typeChart').getContext('2d');
            const typeLabels = Object.keys(data.by_type);
            const typeValues = Object.values(data.by_type);
            
            if (typeChart) typeChart.destroy();
            typeChart = new Chart(typeCtx, {
                type: 'bar',
                data: {
                    labels: typeLabels,
                    datasets: [{ label: 'Count', data: typeValues, backgroundColor: '#00ff88', borderRadius: 4 }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { x: { ticks: { color: '#888' } }, y: { ticks: { color: '#888' }, beginAtZero: true } }
                }
            });
        }

        function updateTable(attacks) {
            const tbody = document.getElementById('attacks-tbody');
            tbody.innerHTML = '';
            
            attacks.forEach((attack, i) => {
                const time = new Date(attack.timestamp + 'Z').toLocaleString();
                const row = document.createElement('tr');
                if (i === 0) row.className = 'new-attack';
                
                const colors = { 'ssh': 'service-ssh', 'http': 'service-http', 'ftp': 'service-ftp',
                                 'mysql': 'service-mysql', 'smb': 'service-smb' };
                
                row.innerHTML = `
                    <td class="timestamp">${time}</td>
                    <td><span class="service-badge ${colors[attack.service] || ''}">${attack.service.toUpperCase()}</span></td>
                    <td class="ip-address">${attack.source_ip}</td>
                    <td class="attack-type">${attack.attack_type}</td>
                    <td style="color:#666;font-size:11px;">${attack.node_id || '-'}</td>
                `;
                tbody.appendChild(row);
            });
            
            if (attacks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;">Waiting for attacks...</td></tr>';
            }
        }

        function connectSSE() {
            const evtSource = new EventSource('/api/stream');
            evtSource.onmessage = function(event) {
                if (event.data) setTimeout(updateStats, 100);
            };
            evtSource.onerror = function() {
                setTimeout(connectSSE, 3000);
            };
        }

        updateStats();
        connectSSE();
        setInterval(updateStats, 10000);
    </script>
</body>
</html>
